<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --BASESIZE: 20;
      --PAGEW: 1080px;
      --MARGIN: 72px;
      --BGCOLOR: #FAFAF8;
      --TEXTCOLOR: #1a1a1a;
      --TEXTSUB: #555555;
      --LINECOLOR: #E5E5E5;
      --ACCENT: #2D5A3D;
      --DANGER: #C0392B;
      --WARN: #D97706;
      --SOFT: #888888;
      --OK: #16A34A;
      --FONTSERIF: 'Noto Serif SC', 'Source Han Serif', Georgia, serif;
      --FONTSANS: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--FONTSANS);
      font-size: calc(var(--BASESIZE) * 1px);
      line-height: 2;
      color: var(--TEXTCOLOR);
      background: var(--BGCOLOR);
      width: var(--PAGEW);
      padding: 0 calc(var(--MARGIN) * 1px);
    }

    /* ===== HEADER ===== */
    .header {
      padding: 80px 0 60px;
      text-align: center;
      border-bottom: 1px solid var(--LINECOLOR);
    }
    .header h1 {
      font-family: var(--FONTSERIF);
      font-size: calc(var(--BASESIZE) * 2.4);
      font-weight: 700;
      color: var(--TEXTCOLOR);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .header .subtitle {
      font-size: calc(var(--BASESIZE) * 1.1);
      color: var(--TEXTSUB);
      letter-spacing: 0.1em;
    }
    .header .tags-row {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: calc(var(--BASESIZE) * 0.85);
      font-weight: 500;
    }
    .tag-danger { background: #FDECEA; color: var(--DANGER); }
    .tag-warn { background: #FEF3C7; color: var(--WARN); }
    .tag-soft { background: #F3F4F6; color: var(--SOFT); }
    .tag-ok { background: #DCFCE7; color: var(--OK); }
    .tag-accent { background: #E8F5E9; color: var(--ACCENT); }

    /* ===== SECTION ===== */
    .section {
      padding: 56px 0;
      border-bottom: 1px solid var(--LINECOLOR);
    }
    .section-title {
      font-family: var(--FONTSERIF);
      font-size: calc(var(--BASESIZE) * 1.5);
      font-weight: 600;
      color: var(--TEXTCOLOR);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--TEXTCOLOR);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title .emoji {
      font-size: calc(var(--BASESIZE) * 1.3);
    }

    /* ===== PROFILE CARD ===== */
    .profile-card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 36px 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 40px;
    }
    .profile-item label {
      font-size: calc(var(--BASESIZE) * 0.75);
      color: var(--SOFT);
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .profile-item .value {
      font-size: calc(var(--BASESIZE) * 1.1);
      color: var(--TEXTCOLOR);
      font-weight: 500;
    }
    .profile-item .tags-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ===== NUTRITION TABLE ===== */
    .nutrition-table {
      width: 100%;
      border-collapse: collapse;
      font-size: calc(var(--BASESIZE) * 0.95);
    }
    .nutrition-table th {
      text-align: left;
      font-size: calc(var(--BASESIZE) * 0.75);
      color: var(--SOFT);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 12px 16px;
      border-bottom: 2px solid var(--TEXTCOLOR);
      font-weight: 500;
    }
    .nutrition-table td {
      padding: 16px;
      border-bottom: 1px solid var(--LINECOLOR);
      vertical-align: middle;
    }
    .nutrition-table tr:last-child td { border-bottom: none; }
    .nutrition-table .highlight td {
      background: #F0FDF4;
      font-weight: 600;
    }
    .nutrition-table .unit { color: var(--SOFT); font-size: 0.85em; }

    /* ===== RECIPE CARD ===== */
    .recipe-card {
      background: #FFFFFF;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .recipe-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--LINECOLOR);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .recipe-name {
      font-family: var(--FONTSERIF);
      font-size: calc(var(--BASESIZE) * 1.6);
      font-weight: 700;
      color: var(--TEXTCOLOR);
    }
    .recipe-meta {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      font-size: calc(var(--BASESIZE) * 0.9);
      color: var(--SOFT);
    }
    .recipe-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .recipe-body {
      padding: 32px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    .recipe-detail { }
    .detail-label {
      font-size: calc(var(--BASESIZE) * 0.75);
      color: var(--SOFT);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .detail-value {
      font-size: calc(var(--BASESIZE) * 1.05);
      color: var(--TEXTCOLOR);
      line-height: 1.8;
    }
    .steps { margin-top: 24px; }
    .steps-label {
      font-size: calc(var(--BASESIZE) * 0.85);
      color: var(--TEXTSUB);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .step {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--ACCENT);
      color: white;
      font-size: calc(var(--BASESIZE) * 0.8);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text {
      font-size: calc(var(--BASESIZE) * 0.95);
      color: var(--TEXTCOLOR);
      line-height: 1.7;
      padding-top: 3px;
    }
    .elder-tips {
      background: #F0FDF4;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 24px;
    }
    .elder-tips .label {
      font-size: calc(var(--BASESIZE) * 0.8);
      font-weight: 600;
      color: var(--ACCENT);
      margin-bottom: 8px;
    }
    .elder-tips ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .elder-tips li {
      font-size: calc(var(--BASESIZE) * 0.9);
      color: var(--TEXTCOLOR);
    }
    .elder-tips li::before { content: '✅ '; }
    .recipe-nutrition {
      background: #F9FAFB;
      border-radius: 12px;
      padding: 24px;
    }
    .recipe-nutrition table {
      width: 100%;
      font-size: calc(var(--BASESIZE) * 0.9);
    }
    .recipe-nutrition th {
      text-align: left;
      color: var(--SOFT);
      font-weight: 500;
      padding: 8px 0;
      border-bottom: 1px solid var(--LINECOLOR);
      font-size: calc(var(--BASESIZE) * 0.75);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .recipe-nutrition td {
      padding: 10px 0;
      border-bottom: 1px solid var(--LINECOLOR);
    }
    .recipe-nutrition tr:last-child td { border-bottom: none; }
    .recipe-nutrition .total-row td {
      font-weight: 600;
      padding-top: 14px;
    }

    /* ===== SHOPPING ===== */
    .shopping-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .shopping-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #FFFFFF;
      border-radius: 10px;
      font-size: calc(var(--BASESIZE) * 1);
    }
    .shopping-item .name { flex: 1; font-weight: 500; }
    .shopping-item .qty { color: var(--SOFT); font-size: 0.9em; }
    .shopping-item .urgent { color: var(--DANGER); font-size: 0.85em; font-weight: 600; }
    .shopping-item .normal { color: var(--SOFT); font-size: 0.85em; }

    /* ===== TIPS ===== */
    .tips-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .tip-card {
      display: flex;
      gap: 20px;
      padding: 24px 28px;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      align-items: flex-start;
    }
    .tip-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .tip-icon-green { background: #DCFCE7; }
    .tip-icon-orange { background: #FEF3C7; }
    .tip-icon-blue { background: #DBEAFE; }
    .tip-icon-purple { background: #EDE9FE; }
    .tip-content { flex: 1; }
    .tip-title {
      font-weight: 600;
      font-size: calc(var(--BASESIZE) * 1.05);
      color: var(--TEXTCOLOR);
      margin-bottom: 6px;
    }
    .tip-text {
      font-size: calc(var(--BASESIZE) * 0.95);
      color: var(--TEXTSUB);
      line-height: 1.8;
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: 48px 0;
      text-align: center;
      font-size: calc(var(--BASESIZE) * 0.8);
      color: var(--SOFT);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--LINECOLOR);
      margin-top: 40px;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      background: var(--LINECOLOR);
      margin: 0 0 40px;
    }

    /* ===== MEAL SUMMARY ===== */
    .meal-summary {
      background: #F9FAFB;
      border-radius: 12px;
      padding: 28px 36px;
      margin-bottom: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .meal-stat label {
      font-size: calc(var(--BASESIZE) * 0.75);
      color: var(--SOFT);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 6px;
    }
    .meal-stat .value {
      font-family: var(--FONTSERIF);
      font-size: calc(var(--BASESIZE) * 1.8);
      font-weight: 700;
      color: var(--ACCENT);
    }
    .meal-stat .unit {
      font-size: calc(var(--BASESIZE) * 0.9);
      color: var(--SOFT);
      font-weight: 400;
    }

    /* ===== REPLACEMENT ===== */
    .replacement {
      background: #F3F4F6;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: calc(var(--BASESIZE) * 0.9);
      color: var(--TEXTSUB);
    }
    .replacement::before { content: '🔄 '; }

  </style>
</head>
<body>

<!-- 板块一：标题区 -->
<header class="header">
  <h1>{{DATE}} 膳食计划</h1>
  <p class="subtitle">{{PERSON}} · {{THEME}}</p>
  <div class="tags-row">
    {{HEADER_TAGS}}
  </div>
</header>

<!-- 板块二：人员档案卡 -->
<section class="section">
  <h2 class="section-title"><span class="emoji">👤</span> 人员档案</h2>
  <div class="profile-card">
    <div class="profile-grid">
      <div class="profile-item">
        <label>称呼</label>
        <div class="value">{{PERSON_NAME}}</div>
      </div>
      <div class="profile-item">
        <label>饮食禁忌</label>
        <div class="tags-row">{{AVOID_TAGS}}</div>
      </div>
      <div class="profile-item">
        <label>特殊医嘱</label>
        <div class="tags-row">{{MEDICAL_TAGS}}</div>
      </div>
      <div class="profile-item">
        <label>软性偏好</label>
        <div class="tags-row">{{PREFERENCE_TAGS}}</div>
      </div>
      <div class="profile-item" style="grid-column: 1 / -1;">
        <label>饮食目标</label>
        <div class="tags-row">{{GOAL_TAGS}}</div>
      </div>
    </div>
  </div>
</section>

<!-- 板块三：膳食目标 -->
<section class="section">
  <h2 class="section-title"><span class="emoji">📊</span> 膳食目标</h2>
  <table class="nutrition-table">
    <thead>
      <tr>
        <th>指标</th>
        <th>目标值</th>
        <th>说明</th>
      </tr>
    </thead>
    <tbody>
      {{NUTRITION_ROWS}}
    </tbody>
  </table>
</section>

<!-- 板块四：菜谱详情 -->
<section class="section">
  <h2 class="section-title"><span class="emoji">🍽️</span> 今日菜谱</h2>

  {{RECIPE_CARDS}}

</section>

<!-- 板块五：健康提示 -->
<section class="section">
  <h2 class="section-title"><span class="emoji">💡</span> 健康提示</h2>
  <div class="tips-list">
    {{TIPS_LIST}}
  </div>
</section>

<!-- 板块六：采购清单 -->
<section class="section">
  <h2 class="section-title"><span class="emoji">🛒</span> 采购清单</h2>
  <div class="shopping-list">
    {{SHOPPING_LIST}}
  </div>
</section>

<!-- 页脚 -->
<footer class="footer">
  由 AI 膳食策划专家生成 · 仅供参考 · 如有特殊情况请咨询医生
</footer>

</body>
</html>
