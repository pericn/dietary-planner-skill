name: Sync orca-insta submodule

on:
  # 每天早上 8 点检查一次（北京时间）
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:
  # 监听 orca-insta 的 repository_dispatch 通知（当 orca-insta 发布新版本时）
  repository_dispatch:
    types: [orca-insta-update]

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false  # 我们手动处理 submodule

      - name: Fetch upstream orca-insta
        run: |
          # 添加 upstream remote（只读）
          git remote add upstream-orca https://github.com/pericn/orca-insta.git 2>/dev/null || true
          git fetch upstream-orca main --tags

      - name: Get current submodule commit
        id: submodule-current
        run: |
          # 获取当前 submodule 记录的 commit SHA
          CURRENT=$(git rev-parse HEAD:orca-insta 2>/dev/null || echo "")
          echo "current_sha=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current orca-insta commit: $CURRENT"

      - name: Get latest upstream commit (automatic)
        if: github.event_name != 'repository_dispatch'
        id: submodule-latest-auto
        run: |
          LATEST=$(git rev-parse upstream-orca/main 2>/dev/null || echo "")
          echo "latest_sha=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest orca-insta commit: $LATEST"

      - name: Get latest upstream commit (from repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        id: submodule-latest-dispatch
        run: |
          LATEST="${{ github.event.client_payload.commit_sha }}"
          echo "latest_sha=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest orca-insta commit (from dispatch): $LATEST"

      - name: Normalize latest SHA
        id: submodule-latest
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "sha=${{ steps.submodule-latest-dispatch.outputs.latest_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ steps.submodule-latest-auto.outputs.latest_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if update needed
        id: needs-update
        run: |
          if [ "${{ steps.submodule-current.outputs.current_sha }}" = "${{ steps.submodule-latest.outputs.sha }}" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "No update needed — submodule is at latest commit"
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "Update available: ${{ steps.submodule-current.outputs.current_sha }} → ${{ steps.submodule-latest.outputs.sha }}"
          fi

      - name: Update submodule and create PR
        if: steps.needs-update.outputs.up_to_date == 'false'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 更新 submodule 到最新 upstream commit
          git submodule update --init orca-insta
          cd orca-insta && git fetch upstream-orca main && git checkout ${{ steps.submodule-latest.outputs.sha }} && cd ..

          # 验证更新
          git add orca-insta
          git diff --cached --stat

          # 检查是否有实际变更
          if git diff --cached --quiet; then
            echo "No submodule changes to commit"
            exit 0
          fi

          # 提交
          git commit -m "chore: update orca-insta submodule to latest

          Updated orca-insta from $(echo ${{ steps.submodule-current.outputs.current_sha }} | cut -c1-7) to $(echo ${{ steps.submodule-latest.outputs.sha }} | cut -c1-7)

          Auto-generated by GitHub Actions sync-submodule workflow."

          # 设置 remote 并推送 branch
          git remote add origin-repo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git 2>/dev/null || \
            git remote set-url origin-repo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:feat/update-orca-insta-submodule -f

          # 创建 PR
          gh pr create \
            --title "chore: update orca-insta submodule to latest" \
            --body "## 自动更新

orca-insta submodule 有新版本，自动创建此 PR。

**变更内容**：$(echo ${{ steps.submodule-current.outputs.current_sha }} | cut -c1-7) → $(echo ${{ steps.submodule-latest.outputs.sha }} | cut -c1-7)

由 \`update-orca-insta-submodule\` workflow 自动生成。" \
            --base main \
            --repo ${{ github.repository }}

          echo "✅ PR created successfully"
